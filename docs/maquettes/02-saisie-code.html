<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crew — 02 Saisie code</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/tabler-icons.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, 'Segoe UI', Inter, sans-serif; background: #F4F4F2; min-height: 100vh; padding: 24px 20px 32px; max-width: 430px; margin: 0 auto; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
.s1 { animation: fadeUp 0.4s 0.05s both cubic-bezier(0.16, 1, 0.3, 1); }
.s2 { animation: fadeUp 0.4s 0.12s both cubic-bezier(0.16, 1, 0.3, 1); }
.s3 { animation: fadeUp 0.4s 0.20s both cubic-bezier(0.16, 1, 0.3, 1); }
.s4 { animation: fadeUp 0.4s 0.28s both cubic-bezier(0.16, 1, 0.3, 1); }
.k { cursor: pointer; transition: all 0.15s cubic-bezier(0.16, 1, 0.3, 1); user-select: none; }
.k:active { transform: scale(0.92); background: #DDDDDA !important; }
</style>
</head>
<body>

<button class="s1" style="background: transparent; border: none; cursor: pointer; padding: 6px 10px 6px 0; margin-bottom: 16px; display: flex; align-items: center; gap: 4px; color: #6B6B6F; font-size: 13px; font-weight: 500;">
  <i class="ti ti-arrow-left" style="font-size: 16px;"></i> Retour
</button>

<div class="s2" style="text-align: center; margin-bottom: 32px;">
  <div style="width: 84px; height: 84px; border-radius: 28px; background: #96D8D0; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px;">
    <span style="font-size: 38px; font-weight: 700; color: #16161B;">C</span>
  </div>
  <p style="font-size: 24px; font-weight: 700; color: #16161B; margin: 0; line-height: 1.15; letter-spacing: -0.3px;">Salut Chana</p>
  <p style="font-size: 14px; color: #6B6B6F; margin: 8px 0 0;">Entre le code équipe</p>
</div>

<div class="s3" style="display: flex; justify-content: center; gap: 14px; margin-bottom: 40px;">
  <div style="width: 16px; height: 16px; border-radius: 50%; background: #16161B; border: 2px solid #16161B;"></div>
  <div style="width: 16px; height: 16px; border-radius: 50%; background: #16161B; border: 2px solid #16161B;"></div>
  <div style="width: 16px; height: 16px; border-radius: 50%; background: transparent; border: 2px solid #DDDDDA;"></div>
  <div style="width: 16px; height: 16px; border-radius: 50%; background: transparent; border: 2px solid #DDDDDA;"></div>
</div>

<div class="s4" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-width: 300px; margin: 0 auto;">
  <div class="k" style="aspect-ratio: 1.4; background: #FFFFFF; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 600; color: #16161B;">1</div>
  <div class="k" style="aspect-ratio: 1.4; background: #FFFFFF; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 600; color: #16161B;">2</div>
  <div class="k" style="aspect-ratio: 1.4; background: #FFFFFF; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 600; color: #16161B;">3</div>
  <div class="k" style="aspect-ratio: 1.4; background: #FFFFFF; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 600; color: #16161B;">4</div>
  <div class="k" style="aspect-ratio: 1.4; background: #FFFFFF; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 600; color: #16161B;">5</div>
  <div class="k" style="aspect-ratio: 1.4; background: #FFFFFF; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 600; color: #16161B;">6</div>
  <div class="k" style="aspect-ratio: 1.4; background: #FFFFFF; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 600; color: #16161B;">7</div>
  <div class="k" style="aspect-ratio: 1.4; background: #FFFFFF; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 600; color: #16161B;">8</div>
  <div class="k" style="aspect-ratio: 1.4; background: #FFFFFF; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 600; color: #16161B;">9</div>
  <div style="aspect-ratio: 1.4;"></div>
  <div class="k" style="aspect-ratio: 1.4; background: #FFFFFF; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 600; color: #16161B;">0</div>
  <div class="k" style="aspect-ratio: 1.4; background: transparent; border-radius: 20px; display: flex; align-items: center; justify-content: center; color: #6B6B6F;">
    <i class="ti ti-backspace" style="font-size: 24px;"></i>
  </div>
</div>

</body>
</html>
